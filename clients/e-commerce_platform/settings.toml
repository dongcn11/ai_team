# AI Team Configuration - E-Commerce Platform
# =====================
# Team: 1 PM + 1 Fullstack Developer

[agents]
# Tool cho từng agent: "claude" hoặc "opencode"
# Model format: provider/model-name (xem: opencode models)

pm_tool   = "opencode"
pm_model  = "opencode/qwen3.5-plus"    # Go plan: 10,200 credits

fs1_tool  = "opencode"
fs1_model = "opencode/qwen3.6-plus"    # Go plan: 3,300 credits

[slack]
bot_token = "xoxb-your-token-here"
channel   = "#ai-team"

[output]
directory = "./output/e-commerce_platform"

[timeouts]
claude_code = 600
opencode    = 600

[tech_stack]
backend  = "Laravel + MySQL"
frontend = "Blade + TailwindCSS"
