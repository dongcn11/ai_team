version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_team_dashboard
      POSTGRES_USER: dashboard
      POSTGRES_PASSWORD: dashboard123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard -d ai_team_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 15

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://dashboard:dashboard123@db:5432/ai_team_dashboard
      CLIENTS_DIR: /clients
      CONFIG_DIR: /config
      PROFILES_DIR: /config
      OUTPUT_DIR: /output
    volumes:
      - ../clients:/clients
      - ../config:/config:ro
      - ../profiles.yaml:/profiles.yaml:ro
      - ../output:/output:ro
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
