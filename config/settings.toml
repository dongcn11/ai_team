# AI Team Configuration
# =====================
# Sửa file này để thay đổi model, Slack, output directory
# Không cần sửa code trong ai_team/

[agents]
# Tool cho từng agent: "claude" hoặc "opencode"
# Model format: provider/model-name (xem: opencode models)

pm_tool     = "claude"
pm_model    = ""                              # claude dùng account đăng nhập

scrum_tool  = "claude"
scrum_model = ""

analyst_tool  = "claude"
analyst_model = ""

be1_tool  = "opencode"
be1_model = "opencode/qwen3.6-plus"     # Go plan: 3,300 credits

be2_tool  = "opencode"
be2_model = "opencode/minimax-m2.7"     # Go plan: 3,400 credits

fe1_tool  = "opencode"
fe1_model = "opencode/qwen3.5-plus"     # Go plan: 10,200 credits

fe2_tool  = "opencode"
fe2_model = "opencode/qwen3.5-plus"     # Go plan: 10,200 credits

[slack]
# Điền token sau khi tạo Slack App
# Hướng dẫn: xem README.md phần Slack Setup
bot_token = "xoxb-your-token-here"
channel   = "#ai-team"

[output]
# Thư mục lưu project được tạo ra
directory = "./output"

[timeouts]
# Giây — tăng nếu model chậm hoặc task phức tạp
claude_code = 600
opencode    = 600

[tech_stack]
# Tech stack mặc định cho coding agents
backend  = "Python FastAPI + SQLModel + SQLite"
frontend = "React + TypeScript + Vite + TailwindCSS"
